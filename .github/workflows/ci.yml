name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      SUPABASE_SECRET_KEY: test-secret-key
      OPENAI_API_KEY: test-openai-key
      OPENAI_SEAT_MAP_MODEL: gpt-5.4-mini
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

  deploy-production:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify production secrets
        run: |
          test -n "$DATABASE_URL"
          test -n "$DIRECT_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Deploy Prisma migrations
        run: pnpm prisma:deploy

      - name: Pull Vercel production environment
        run: pnpm exec vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production output
        run: pnpm exec vercel build --prod --token="$VERCEL_TOKEN"

      - name: Verify Supabase browser config in production output
        run: |
          if grep -R 'hasSupabaseBrowserConfig",0,function(){return!1}' .vercel/output/static/_next/static/chunks >/dev/null 2>&1; then
            echo "Supabase browser environment variables were not embedded in the production client bundle." >&2
            exit 1
          fi

      - name: Deploy to Vercel production
        run: pnpm exec vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
